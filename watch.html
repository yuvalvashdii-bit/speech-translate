<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Translation</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: radial-gradient(1000px 500px at 50% -10%, #14233f, #0a0f1c 55%);
    color: #eef3ff; display: flex; flex-direction: column;
  }
  header {
    position: sticky; top: 0; z-index: 5; backdrop-filter: blur(8px);
    background: rgba(10,16,28,.85); border-bottom: 1px solid #1e2c48;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  header .title { font-weight: 700; font-size: 15px; flex: 1; }
  select {
    background: #0f1a30; color: #dfe9ff; border: 1px solid #2a3a5c;
    border-radius: 10px; padding: 10px 12px; font-size: 15px; font-weight: 600;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #64748b; }
  .dot.on { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
  .dot.live { background: #ef4444; box-shadow: 0 0 10px #ef4444; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  main { flex: 1; overflow-y: auto; padding: 18px 16px 40vh; }
  .seg { margin: 0 0 18px; animation: fade .25s ease; }
  .seg .tr { font-size: clamp(20px, 4.6vw, 30px); line-height: 1.45; font-weight: 600; }
  .seg .src {
    font-size: 14px; color: #8394ba; margin-top: 6px; direction: rtl; text-align: right;
    display: none;
  }
  body.show-src .seg .src { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } }
  .empty { color: #7c8bb0; text-align: center; margin-top: 18vh; font-size: 16px; line-height: 1.6; padding: 0 20px; }
  footer {
    position: sticky; bottom: 0; background: rgba(10,16,28,.9); border-top: 1px solid #1e2c48;
    padding: 8px 16px; display: flex; align-items: center; gap: 14px; font-size: 13px; color: #9fb0d3;
  }
  footer label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .status { flex: 1; display: flex; align-items: center; gap: 8px; }
</style>
<header>
  <span class="dot" id="dot"></span>
  <span class="title" id="title">שידור חי</span>
  <select id="langSel" aria-label="language"></select>
</header>
<main id="feed">
  <div class="empty" id="empty">בחר שפה למעלה והמתן — התרגום יופיע כאן ברגע שהדובר יתחיל לדבר.</div>
</main>
<footer>
  <span class="status"><span id="statusText">מתחבר…</span></span>
  <label><input type="checkbox" id="showSrc"> הצג מקור (עברית)</label>
</footer>

<script>
const params = new URLSearchParams(location.search);
const sessionId = params.get('s');

const RTL = new Set(['he', 'ar']);
const feed = document.getElementById('feed');
const emptyEl = document.getElementById('empty');
const dot = document.getElementById('dot');
const statusText = document.getElementById('statusText');
const langSel = document.getElementById('langSel');
const title = document.getElementById('title');

// Preferred order in the dropdown (Russian first — priority).
const ORDER = ['ru','en','ar','he','uk','am','es','fr','de','ro','pt','it','tr','zh','hi'];
const NATIVE = {
  ru:'Русский', en:'English', ar:'العربية', he:'עברית', uk:'Українська', am:'አማርኛ',
  es:'Español', fr:'Français', de:'Deutsch', ro:'Română', pt:'Português', it:'Italiano',
  tr:'Türkçe', zh:'中文', hi:'हिन्दी'
};

let lang = localStorage.getItem('lt_lang') || 'ru';
let ws = null;

// Build language selector.
for (const code of ORDER) {
  const o = document.createElement('option');
  o.value = code; o.textContent = NATIVE[code] || code;
  if (code === lang) o.selected = true;
  langSel.appendChild(o);
}
langSel.addEventListener('change', () => {
  lang = langSel.value;
  localStorage.setItem('lt_lang', lang);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'setLang', lang }));
  }
  // Clear feed on language change to avoid mixing languages.
  [...feed.querySelectorAll('.seg')].forEach((n) => n.remove());
  showEmpty(true);
});

document.getElementById('showSrc').addEventListener('change', (e) => {
  document.body.classList.toggle('show-src', e.target.checked);
});

function showEmpty(v) { emptyEl.style.display = v ? 'block' : 'none'; }
function setStatus(text, cls) { statusText.textContent = text; dot.className = 'dot' + (cls ? ' ' + cls : ''); }

function addSeg(source, text, code) {
  showEmpty(false);
  const seg = document.createElement('div');
  seg.className = 'seg';
  const tr = document.createElement('div');
  tr.className = 'tr';
  tr.textContent = text;
  tr.dir = RTL.has(code) ? 'rtl' : 'ltr';
  tr.style.textAlign = RTL.has(code) ? 'right' : 'left';
  const src = document.createElement('div');
  src.className = 'src';
  src.textContent = source;
  seg.appendChild(tr); seg.appendChild(src);
  feed.appendChild(seg);
  // Auto-scroll to latest.
  window.scrollTo(0, document.body.scrollHeight);
  feed.scrollTop = feed.scrollHeight;
  // Trim to last 60 segments.
  const segs = feed.querySelectorAll('.seg');
  if (segs.length > 60) segs[0].remove();
}

async function connect() {
  if (!sessionId) { setStatus('קישור לא תקין', ''); return; }
  // Validate session exists first (friendlier error).
  try {
    const r = await fetch('/api/session/' + encodeURIComponent(sessionId));
    const { exists } = await r.json();
    if (!exists) { setStatus('השידור לא נמצא או הסתיים', ''); emptyEl.textContent = 'השידור לא נמצא או שהסתיים. בקש קישור חדש מהדובר.'; return; }
  } catch {}

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/watch?s=${encodeURIComponent(sessionId)}&lang=${encodeURIComponent(lang)}`);
  ws.onopen = () => setStatus('מחובר — ממתין לדובר', 'on');
  ws.onclose = () => { setStatus('החיבור נסגר — מנסה שוב…', ''); setTimeout(connect, 1500); };
  ws.onerror = () => {};
  ws.onmessage = (ev) => {
    try {
      const m = JSON.parse(ev.data);
      if (m.type === 'segment') { setStatus('משדר עכשיו', 'live'); addSeg(m.source, m.text, m.lang); }
      if (m.type === 'ready') setStatus('מחובר — ממתין לדובר', 'on');
      if (m.type === 'error') { setStatus('שגיאה: ' + m.message, ''); }
    } catch {}
  };
}
connect();
</script>
